<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>GNSS Session Animation</title>
<style>
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background: #f5f5f5;
    }

    header {
        background: #222;
        color: white;
        padding: 14px 20px;
        font-size: 22px;
        font-weight: bold;
    }

    .tabs {
        display: flex;
        flex-wrap: wrap;
        background: #333;
        position: sticky;
        top: 0;
        z-index: 10;
    }

    .tabs button {
        background: #333;
        color: white;
        border: none;
        padding: 12px 18px;
        cursor: pointer;
        font-size: 15px;
    }

    .tabs button:hover {
        background: #555;
    }

    .tabs button.active {
        background: #0b72b9;
    }

    .pane {
        padding: 12px;
    }

    .frame-title {
        font-size: 18px;
        font-weight: bold;
        margin: 14px 0 8px 0;
    }

    iframe {
        width: 100%;
        border: 1px solid #bbb;
        background: white;
    }

    #animationFrame {
        height: 720px;
    }

    #dashboardFrame {
        height: 720px;
    }
</style>
</head>
<body>

<header>GNSS Session Animation 2026&#xA9;phisan.s@chula.ac.th</header>

<div class="tabs" id="tabs"></div>

<div class="pane">
    <div class="frame-title" id="animTitle">Animation</div>
    <iframe id="animationFrame"></iframe>

    <div class="frame-title" id="dashTitle">Dashboard</div>
    <iframe id="dashboardFrame"></iframe>
</div>

<script>
const datasets = [
    {
        name: "RESULT_3xRCV",
        animation: "RESULT_3xRCV_5_Animation_Session.html",
        dashboard: "RESULT_3xRCV_4_dashboard.html"
    },
    {
        name: "RESULT_4xRCV",
        animation: "RESULT_4xRCV_5_Animation_Session.html",
        dashboard: "RESULT_4xRCV_4_dashboard.html"
    },
    {
        name: "RESULT_5xRCV",
        animation: "RESULT_5xRCV_5_Animation_Session.html",
        dashboard: "RESULT_5xRCV_4_dashboard.html"
    },
    {
        name: "RESULT_6xRCV",
        animation: "RESULT_6xRCV_5_Animation_Session.html",
        dashboard: "RESULT_6xRCV_4_dashboard.html"
    },
];

const tabs = document.getElementById("tabs");
const animationFrame = document.getElementById("animationFrame");
const dashboardFrame = document.getElementById("dashboardFrame");
const animTitle = document.getElementById("animTitle");
const dashTitle = document.getElementById("dashTitle");

function openDataset(index) {
    const item = datasets[index];

    animationFrame.src = item.animation;
    dashboardFrame.src = item.dashboard;

    animTitle.textContent = item.name + " : Animation";
    dashTitle.textContent = item.name + " : Dashboard";

    document.querySelectorAll(".tabs button").forEach((btn, i) => {
        btn.classList.toggle("active", i === index);
    });
}

datasets.forEach((item, index) => {
    const btn = document.createElement("button");
    btn.textContent = item.name;
    btn.onclick = () => openDataset(index);
    tabs.appendChild(btn);
});

if (datasets.length > 0) {
    openDataset(0);
} else {
    document.body.innerHTML += "<p>No RESULT_?xRCV folders found.</p>";
}
</script>

</body>
</html>
